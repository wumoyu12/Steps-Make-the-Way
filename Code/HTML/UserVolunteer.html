<html>
<head>
    <title>Volunteer</title>
    <link rel="icon" href="/static/logo.jpg" type="image/x-icon">
	<link rel="stylesheet" href="/static/Volunteer.css">
    <script src="/static/UserVolunteer.js"></script>
</head>
<body>
	<header>
        <table style="width:100%">
            <tr>
                <td id="back"><button type="button" id="btnhome"  onclick="window.location.href='/UserHome'">Back Home</button></td>
                <th id="thSMTW" width="90%">Steps Make the Way</th>
                <td id="logout"><button type="button" id="btnlogout" onclick="window.location.href='/'">Log out</button></td>
            </tr>
        </table>
    </header>
	<h2>Volunteer Registration</h2>
	<div id="WelcomeMSG">
		<table width="100%">
			<tr>
				<td id="Welcome" style="text-align:left">
					<label id="lblwlcmsg">Join Us Here!</label>
				</td>
			</tr>
			<tr>
				<td id="Welcome" style="text-align:left">
					<label id="lblwlcmsg">We can't wait to work together to create positive change!</label>
				</td>
			</tr>
		</table>
	</div>
				
    <input type="hidden" id="usermsg" value="{{ usermsg }}">

    <div id="registrationform" style="display:none;">
        <form id="VolunteerForm" action="/RegisterVolunteer" method="POST">
            <table>
                <tr>
                    <td><label>First Name:</label></td>
                    <td><input type="text" id="txtfirstname" name="txtfirstname"></td>
                </tr>
                <tr>
                    <td><label>Last Name:</label></td>
                    <td><input type="text" id="txtlastname" name="txtlastname"></td>
                </tr>
                <tr>
                    <td><label>Birth Date:</label></td>
                    <td><input type="date" id="txtbirthdate" name="txtbirthdate"></td>
                </tr>
                <tr>
                    <td><label>Gender:</label></td>
                    <td>
                        <select id="gender" name="gender">
                            <option value="">Select</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </td>
                </tr>
			</table>
			<table style="width:90%">
				<tr>
					<td style="text-align:right"><button style="margin-right:0px" type="button" id="btnsubmit">Submit</button></td>
				</tr>
            </table>
        </form>
        {% if error %}
        <p style="color:red">{{ error }}</p>
        {% endif %}
    </div>

    <div id="volunteerinfo" style="display:none;text-align: center"">
        <h2>My Volunteer Information</h2>
        <table border="1">
            <tr>
                <th>ID</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Birth Date</th>
                <th>Gender</th>
            </tr>
            <tr>
                <td>{{ volunteerid }}</td>
                <td>{{ firstname }}</td>
                <td>{{ lastname }}</td>
                <td>{{ dob }}</td>
                <td>{{ gender }}</td>
            </tr>
        </table><br>
		<label><strong>Thank you for registering. You are now our official volunteer!</strong></label>
    </div>
</body>
</html>
