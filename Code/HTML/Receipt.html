<html>
	<head>
		<title>Receipt</title>
		<link rel="stylesheet" href="\static\products.css">
	</head>

	<body>
		<form action="/receiptinfo" method="post" id="ReceiptForm">
            <br><br>
			<table style="width:90%; margin: 0 auto;">
				<tr>
					<td id="cart"><img id="displayimage" src="/static/Smile.jpg" height="120px" width="120px"></td>
					<th id="thSMTW" width="90%">Purchase is Done!</th>
					<td id="BackHome"><button type="button" id="btnhome" onclick="window.location.href='/UserHome'">Back Home</button></td>
				</tr>
			</table>
            <br><br><br><br>
            <div id="items">
				<table style="width:90%;margin:auto" id="tblCart">
					<tr>
						{% for header in headings %}
							<th style="width:20%; font-size:23px">{{header}}</th>
						{% endfor %}
					</tr>
					
					{% for row in data %}
					<tr>
						
						{% for cell in row %}
							{% if cell.endswith('.jpg')%}
								<td><img src="{{ url_for('static', filename=cell) }}" width="80px"></td>
							{% else %}
								<td>{{cell}}</td>
							{% endif %}
						{% endfor %}

					</tr>
					{% endfor %}
					<tr>
						<td colspan="5" style="text-align:right"><label><h4>Total Price:${{pricetotal}}</h4></label></td>
					</tr>
				</table>
				
				<table style="width:90%;margin:auto" id="thankyoumsg">
					<tr>
						<td style="text-align:center;padding:0px;">
							<label><h3>Thank you for your purchasing!</h3></label><br>
						</td>
					</tr>
					<tr>
						<td style="text-align:center;padding:0px;">
							<label><h3>Your kindness brings hope, healing, and strength to those who need it most.</h3></label>
						</td>
					</tr>
				</table>
				
			</div>
		</form>
	</body>
</html>
