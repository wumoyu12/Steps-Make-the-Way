<html>
	<head>
		<title>User Home</title>
		<link rel="stylesheet" href="/static/home.css">
	</head>
	<body>
		<header>
			<table id="title" style="width:100%">
				<tr>
					<td id="logo"><img id="displayimage" src="/static/logo.jpg" height="120px" width="120px"></td>
					<th id="thSMTW" width="90%">Steps Make the Way</th>
					<td id="logout"><button type="button" id="btnlogout" onclick="window.location.href='/'">Log out</button></td>
				</tr>
			</table>
		</header>
		<label id="lblwlcmsg">Welcome {{username}}!</label>
		
		<div id="information">
			<form action="/UserHome" method="POST">
				<table width="100%">
					<tr>
						<td id="Welcome" colspan="5">
							<label id="lblwlcmsg2">This is not just where you give your time—</label><br>
							<label id="lblwlcmsg">it's where time gives back!</label>
						</td>
					</tr>
					<tr>
						<td id="Intro" width="25%">
							<button id="btnUserIntro" type="button" onclick="window.location.href='/UserIntro'">
								<img id="displayimage" src="/static/UserIntro.jpg" height="100%" width="100%">
							</button>
						</td>
						<td id="Events" width="25%">
							<button id="btnUserEvents" type="button" onclick="window.location.href='/UserEvents'">
								<img id="displayimage" src="/static/UserEvents.jpg" height="100%" width="100%">
							</button>
						</td>
						<td id="Product" width="25%">
							<button id="btnUserProduct" type="button" onclick="window.location.href='/UserProduct'">
								<img id="displayimage" src="/static/UserDonation.jpg" height="100%" width="100%">
							</button>
						</td>
						<td id="Volunteers" width="25%">
							<button id="btnUserVolunteers" type="button" onclick="window.location.href='/UserVolunteer'">
								<img id="displayimage" src="/static/UserVolunteer.jpg" height="100%" width="100%">
							</button>
						</td>
					</tr>
				</table>
			</form>
		</div>
	</body>
</html>
